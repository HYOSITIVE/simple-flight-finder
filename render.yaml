services:
  - type: web
    name: flight-finder
    runtime: python
    pythonVersion: "3.10"
    buildCommand: "pip install uv && uv sync && npm install && npm run build"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
